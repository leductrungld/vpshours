name: 🚀 SEVER AI STV PREMIUM

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Thời gian sử dụng'
        required: false
        default: '365day'
        type: choice
        options:
          - '1h'
          - '3h'
          - '365day'

jobs:
  Premium-RDP-Setup:
    runs-on: windows-latest

    # 365 ngày = 525600 phút
    timeout-minutes: 525600

    steps:
      - name: 🎯 KHỞI ĐỘNG HỆ THỐNG
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "🤖 AI STV PREMIUM RDP SERVER" -ForegroundColor Yellow
          Write-Host "⚡ Powered by AI STV" -ForegroundColor Green
          Write-Host "🕒 Thời gian: ${{ github.event.inputs.duration }}" -ForegroundColor Cyan
          Write-Host ""

      - name: 🔧 CẤU HÌNH HỆ THỐNG
        shell: powershell
        run: |

          # Enable RDP
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0

          # Disable NLA
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" `
            -Value 0

          # Firewall
          netsh advfirewall firewall add rule `
            name="RDP" `
            dir=in `
            action=allow `
            protocol=TCP `
            localport=3389

          # Start services
          Set-Service -Name TermService -StartupType Automatic
          Start-Service TermService

          Write-Host "✅ RDP đã bật!" -ForegroundColor Green

      - name: 👤 TẠO USER
        shell: powershell
        run: |

          function New-RandomPassword {
              $chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789'
              $pw = ""

              for ($i = 0; $i -lt 8; $i++) {
                  $pw += $chars[(Get-Random -Minimum 0 -Maximum $chars.Length)]
              }

              return $pw
          }

          $password = New-RandomPassword

          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          try {
              Remove-LocalUser -Name "AISTV-PREMIUM" -ErrorAction SilentlyContinue
          } catch {}

          New-LocalUser `
            -Name "AISTV-PREMIUM" `
            -Password $secure `
            -AccountNeverExpires

          Add-LocalGroupMember `
            -Group "Administrators" `
            -Member "AISTV-PREMIUM"

          Add-LocalGroupMember `
            -Group "Remote Desktop Users" `
            -Member "AISTV-PREMIUM"

          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

          Write-Host "✅ User đã tạo!" -ForegroundColor Green

      - name: 🌐 CÀI TAILSCALE
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |

          $msi = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest `
            -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" `
            -OutFile $msi

          Start-Process msiexec.exe `
            -ArgumentList "/i `"$msi`" /quiet /norestart" `
            -Wait

          Start-Sleep 10

          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=$env:TAILSCALE_AUTH_KEY `
            --hostname=ai-stv-${{ github.run_id }}

          Start-Sleep 10

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

          Write-Host "✅ Tailscale connected!" -ForegroundColor Green

      - name: 🎉 HIỂN THỊ THÔNG TIN
        shell: powershell
        run: |

          $durationInput = "${{ github.event.inputs.duration }}"

          switch ($durationInput) {

              "1h" {
                  $totalMinutes = 60
                  $displayTime = "1 giờ"
              }

              "3h" {
                  $totalMinutes = 180
                  $displayTime = "3 giờ"
              }

              "365day" {
                  $totalMinutes = 525600
                  $displayTime = "365 ngày"
              }

              default {
                  $totalMinutes = 60
                  $displayTime = "1 giờ"
              }
          }

          echo "TOTAL_MINUTES=$totalMinutes" >> $env:GITHUB_ENV

          Write-Host ""
          Write-Host "===============================" -ForegroundColor Cyan
          Write-Host "🎉 THÔNG TIN RDP" -ForegroundColor Yellow
          Write-Host "===============================" -ForegroundColor Cyan
          Write-Host "🌐 IP: $env:TAILSCALE_IP"
          Write-Host "👤 USER: AISTV-PREMIUM"
          Write-Host "🔑 PASS: $env:RDP_PASS"
          Write-Host "⏰ TIME: $displayTime"
          Write-Host "🖥 PORT: 3389"
          Write-Host "===============================" -ForegroundColor Cyan

      - name: ⏳ GIỮ SERVER HOẠT ĐỘNG
        shell: powershell
        run: |

          $minutes = [int]$env:TOTAL_MINUTES

          for ($i = 0; $i -lt $minutes; $i++) {

              $remaining = $minutes - $i

              Write-Host "🟢 Server đang chạy... còn $remaining phút"

              Start-Sleep -Seconds 60
          }

      - name: 🧹 DỌN DẸP
        if: always()
        shell: powershell
        run: |

          try {
              Disable-LocalUser -Name "AISTV-PREMIUM"
          } catch {}

          try {
              & "$env:ProgramFiles\Tailscale\tailscale.exe" down
          } catch {}

          Write-Host "✅ Đã dọn dẹp!"
